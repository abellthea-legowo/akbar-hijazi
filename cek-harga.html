<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Portal Mitra B2B</title>
</head>
<body class="bg-slate-100 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded shadow-xl border-t-8 border-yellow-600">
        <h2 class="text-xl font-bold mb-6">KALKULATOR HARGA LA</h2>
        <label class="block text-xs font-bold mb-2">PILIH HOTEL</label>
        <select id="hotel" class="w-full p-2 border mb-4 font-bold">
            <option value="500">Anjum Madinah (SAR 500)</option>
            <option value="750">Swissotel Makkah (SAR 750)</option>
        </select>
        <label class="block text-xs font-bold mb-2">JUMLAH PAX</label>
        <input type="number" id="pax" value="1" class="w-full p-2 border mb-6 font-bold">
        <div class="bg-slate-900 text-white p-4 text-center">
            <div class="text-2xl text-yellow-500 font-black" id="total">SAR 0</div>
        </div>
    </div>
    <script>
        function hitung() {
            let total = document.getElementById('hotel').value * document.getElementById('pax').value;
            document.getElementById('total').innerText = 'SAR ' + total.toLocaleString();
        }
        document.getElementById('hotel').addEventListener('change', hitung);
        document.getElementById('pax').addEventListener('input', hitung);
    </script>
</body>
</html>
